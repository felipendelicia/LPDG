<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Los pibes de Gerli · Archivo</title>
<meta name="description" content="Todas las portadas: la actual y las archivadas." />
<link rel="icon" href="photos/logo-lpdg.svg" type="image/svg+xml" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />

<style>
  /* ---- específico del archivo ---- */
  .wrap{position:relative;z-index:2;max-width:1180px;margin:0 auto;padding:clamp(1.4rem,5vw,2.6rem) var(--pad-x) 6rem}

  .top{display:flex;align-items:center;gap:1rem;justify-content:space-between;margin-bottom:clamp(2.4rem,8vw,4rem)}
  .top a.back{color:var(--ink);text-decoration:none;font-weight:700;font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;
    display:inline-flex;align-items:center;gap:.6em;border-bottom:2px solid var(--accent);padding-bottom:3px;transition:color .2s}
  .top a.back:hover{color:var(--accent)}
  .top .brand{display:flex;align-items:center;gap:.6em;font-weight:800;letter-spacing:.04em;font-size:.95rem;color:var(--ink)}
  .top .brand .tri{width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-bottom:15px solid var(--accent)}

  .head{margin-bottom:clamp(2.4rem,8vw,4rem)}
  .head .eyebrow{margin-bottom:clamp(1rem,3vw,1.6rem)}
  .title{font-weight:800;text-transform:uppercase;line-height:.9;letter-spacing:-.03em;
    font-size:clamp(2.8rem,12vw,7.5rem)}
  .title .v{color:var(--accent)}
  .lede{font-family:var(--font-serif);font-style:italic;color:var(--mut);
    font-size:clamp(1.2rem,3.2vw,1.9rem);line-height:1.3;max-width:40ch;margin-top:1.4rem}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:clamp(1.4rem,4vw,2.4rem)}

  .card{position:relative;display:flex;flex-direction:column;text-decoration:none;color:inherit;
    background:var(--panel);border:1px solid var(--line-2);overflow:hidden;
    transition:transform .3s cubic-bezier(.2,.7,.2,1),border-color .25s}
  .card:hover{transform:translateY(-6px);border-color:var(--accent)}

  .shot{position:relative;width:100%;aspect-ratio:1140/780;overflow:hidden;background:#000;border-bottom:1px solid var(--line-2)}
  .shot iframe{position:absolute;top:0;left:0;width:1140px;height:780px;border:0;
    transform:scale(var(--s,.26));transform-origin:top left;pointer-events:none}
  .shot::after{content:"";position:absolute;inset:0;background:rgba(43,255,136,0);transition:background .25s}
  .card:hover .shot::after{background:rgba(43,255,136,.14)}
  .open{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) scale(.9);z-index:2;
    background:var(--accent);color:#04140a;font-weight:700;font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;
    padding:.85em 1.3em;opacity:0;transition:opacity .25s,transform .25s}
  .card:hover .open{opacity:1;transform:translate(-50%,-50%) scale(1)}

  .meta{padding:1.2rem 1.3rem 1.4rem;display:flex;flex-direction:column;gap:.55rem}
  .row{display:flex;align-items:center;justify-content:space-between;gap:.8rem}
  .idx{font-weight:600;font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:var(--mut)}
  .tag{font-weight:700;font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;padding:.35em .7em;white-space:nowrap}
  .tag.live{background:var(--accent);color:#04140a}
  .tag.ro{background:transparent;color:var(--mut);border:1px solid var(--line-2)}
  .name{font-weight:800;font-size:clamp(1.5rem,4vw,2.1rem);line-height:1;letter-spacing:-.02em;text-transform:uppercase}
  .desc{font-weight:500;font-size:.68rem;letter-spacing:.06em;color:var(--mut);line-height:1.5;text-transform:uppercase}
</style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <a class="back" href="index.html">← Volver</a>
      <span class="brand"><span class="tri"></span>LPDG · Archivo</span>
    </div>

    <header class="head">
      <p class="eyebrow reveal">Colección</p>
      <h1 class="title reveal d1">Archivo de <span class="v">portadas</span></h1>
      <p class="lede reveal d2">Cada vez que la página cambia de cara, la anterior queda acá. Tocá una para verla entera.</p>
    </header>

    <div class="grid">

      <a class="card reveal" href="index.html">
        <div class="shot"><iframe src="index.html" loading="lazy" tabindex="-1" scrolling="no" title="En espera"></iframe></div>
        <span class="open">abrir ↗</span>
        <div class="meta">
          <div class="row"><span class="idx">02 · actual</span><span class="tag live">en vivo</span></div>
          <div class="name">En espera</div>
          <div class="desc">Under · negro & verde · timer</div>
        </div>
      </a>

      <a class="card reveal d1" href="legacy/cumple-gianni.html">
        <div class="shot"><iframe src="legacy/cumple-gianni.html" loading="lazy" tabindex="-1" scrolling="no" title="Cumple de Gianni"></iframe></div>
        <span class="open">abrir ↗</span>
        <div class="meta">
          <div class="row"><span class="idx">01 · jun 2026</span><span class="tag ro">read only</span></div>
          <div class="name">Cumple de Gianni</div>
          <div class="desc">Flyer underground · kraft & marker</div>
        </div>
      </a>

    </div>
  </div>

<script>
  document.documentElement.classList.add('js');

  // escala cada preview: el iframe (1140px lógicos) entra justo en la card
  function fit(){
    document.querySelectorAll('.shot').forEach(s=>{ s.style.setProperty('--s', s.clientWidth/1140); });
  }
  fit();
  addEventListener('resize',fit);
  addEventListener('load',fit);

  // reveal
  const io=new IntersectionObserver((es)=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}});},{threshold:.12});
  document.querySelectorAll('.reveal').forEach(n=>io.observe(n));
</script>
</body>
</html>
